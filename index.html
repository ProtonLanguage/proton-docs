<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proton# Docs</title>
  <link rel="icon" type="image/png" href="docs-icon.png"/>
  <link rel="apple-touch-icon" href="docs-icon.png"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0a0a0a;--bg-card:#111;--bg-panel:#161616;--bg-hover:#1a1a1a;
      --orange:#FF6B00;--orange-lo:rgba(255,107,0,0.08);--orange-mid:#ff8c38;
      --text:#f0f0f0;--gray:#666;--gray-hi:#999;--gray-lo:#333;
      --border:#1e1e1e;--border-hi:#2a2a2a;
      --code-bg:#0d0d0d;--sidebar-w:260px;--topbar-h:52px;
    }
    html,body{height:100%;overflow:hidden;}
    body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;flex-direction:column;}

    /* ── TOPBAR ── */
    .topbar{height:var(--topbar-h);background:rgba(10,10,10,0.97);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0;z-index:100;position:relative;}
    .topbar-logo{font-weight:900;font-size:1rem;color:var(--orange);text-decoration:none;white-space:nowrap;font-family:'JetBrains Mono',monospace;}
    .topbar-sep{color:var(--gray);font-size:0.8rem;}
    .topbar-breadcrumb{font-size:0.78rem;color:var(--gray-hi);font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:6px;}
    .topbar-breadcrumb .bc-section{color:var(--orange);}
    .topbar-breadcrumb .bc-sub{color:var(--text);}
    .topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
    .topbar-search{position:relative;}
    .topbar-search input{background:var(--bg-panel);border:1px solid var(--border);border-radius:8px;padding:6px 12px 6px 32px;color:var(--text);font-family:'Syne',sans-serif;font-size:0.82rem;outline:none;width:200px;transition:all 0.2s;}
    .topbar-search input:focus{border-color:var(--orange);width:280px;}
    .topbar-search input::placeholder{color:var(--gray);}
    .topbar-search .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--gray);font-size:0.8rem;pointer-events:none;}
    .topbar-link{color:var(--gray-hi);text-decoration:none;font-size:0.8rem;font-weight:600;padding:5px 10px;border-radius:6px;transition:all 0.15s;}
    .topbar-link:hover{color:var(--text);background:var(--bg-hover);}
    .version-badge{font-family:'JetBrains Mono',monospace;font-size:0.65rem;background:var(--orange-lo);color:var(--orange);border:1px solid rgba(255,107,0,0.25);padding:2px 8px;border-radius:20px;}

    /* ── LAYOUT ── */
    .layout{display:flex;flex:1;overflow:hidden;}

    /* ── SIDEBAR ── */
    .sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
    .sb-scroll{flex:1;overflow-y:auto;padding:8px 0 20px;}
    .sb-scroll::-webkit-scrollbar{width:3px;}
    .sb-scroll::-webkit-scrollbar-thumb{background:var(--border-hi);}
    .sb-group{margin-bottom:4px;}
    .sb-group-btn{width:100%;background:none;border:none;display:flex;align-items:center;gap:8px;padding:9px 16px;color:var(--gray-hi);font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:700;cursor:pointer;text-align:left;transition:all 0.15s;position:relative;}
    .sb-group-btn:hover{color:var(--text);background:var(--bg-hover);}
    .sb-group-btn.active{color:var(--orange);}
    .sb-group-btn .g-icon{font-size:0.9rem;width:18px;text-align:center;flex-shrink:0;}
    .sb-group-btn .g-arrow{margin-left:auto;font-size:0.65rem;color:var(--gray);transition:transform 0.2s;}
    .sb-group-btn.open .g-arrow{transform:rotate(90deg);}
    .sb-group-btn .g-count{font-size:0.62rem;color:var(--gray);font-family:'JetBrains Mono',monospace;background:var(--bg-panel);padding:1px 6px;border-radius:10px;}
    .sb-subs{display:none;padding-left:0;}
    .sb-subs.open{display:block;}
    .sb-sub-btn{width:100%;background:none;border:none;border-left:2px solid transparent;display:flex;align-items:center;gap:8px;padding:7px 16px 7px 42px;color:var(--gray);font-family:'Syne',sans-serif;font-size:0.8rem;cursor:pointer;text-align:left;transition:all 0.12s;}
    .sb-sub-btn:hover{color:var(--gray-hi);background:var(--bg-hover);}
    .sb-sub-btn.active{color:var(--orange);border-left-color:var(--orange);background:var(--orange-lo);}
    .sb-label{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--gray);padding:12px 16px 4px;font-family:'JetBrains Mono',monospace;}
    .sb-divider{height:1px;background:var(--border);margin:8px 16px;}

    /* ── MAIN CONTENT ── */
    .main{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
    .main::-webkit-scrollbar{width:4px;}
    .main::-webkit-scrollbar-thumb{background:var(--border-hi);}
    .content{max-width:860px;padding:48px 56px;flex:1;}

    /* Section landing page */
    .section-landing{margin-bottom:48px;}
    .section-landing .sl-tag{font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--orange);margin-bottom:10px;}
    .section-landing h1{font-size:2.2rem;font-weight:900;margin-bottom:16px;line-height:1.2;}
    .section-landing .sl-intro{font-size:1rem;color:var(--gray-hi);line-height:1.75;border-left:3px solid var(--orange);padding-left:16px;margin-bottom:40px;}
    .sub-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
    .sub-card{background:var(--bg-panel);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all 0.2s;}
    .sub-card:hover{border-color:var(--orange);background:var(--orange-lo);transform:translateY(-1px);}
    .sub-card .sc-icon{font-size:1.4rem;margin-bottom:10px;}
    .sub-card .sc-name{font-size:0.9rem;font-weight:700;margin-bottom:4px;}
    .sub-card .sc-desc{font-size:0.78rem;color:var(--gray-hi);line-height:1.5;}
    .sub-card .sc-arrow{font-size:0.7rem;color:var(--orange);margin-top:10px;}

    /* Content page */
    .doc-page{}
    .doc-page .dp-tag{font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--orange);margin-bottom:10px;}
    .doc-page h1{font-size:1.9rem;font-weight:900;margin-bottom:12px;}
    .doc-page .dp-intro{font-size:0.95rem;color:var(--gray-hi);line-height:1.75;border-left:3px solid var(--orange);padding-left:16px;margin-bottom:32px;}

    /* Shared doc content styles */
    h2{font-size:1.15rem;font-weight:800;margin:32px 0 12px;padding-top:8px;border-top:1px solid var(--border);}
    h3{font-size:0.95rem;font-weight:700;margin:20px 0 8px;color:var(--orange);}
    p{font-size:0.9rem;color:var(--gray-hi);line-height:1.75;margin-bottom:14px;}
    code{font-family:'JetBrains Mono',monospace;font-size:0.82rem;background:var(--code-bg);border:1px solid var(--border);padding:1px 6px;border-radius:4px;color:#ff9d5c;}
    pre{background:var(--code-bg);border:1px solid var(--border);border-radius:10px;padding:20px;margin:16px 0;overflow-x:auto;}
    pre code{background:none;border:none;padding:0;font-size:0.85rem;color:var(--text);line-height:1.7;}
    table{width:100%;border-collapse:collapse;margin:16px 0;font-size:0.85rem;}
    th{text-align:left;padding:8px 12px;border-bottom:2px solid var(--border);color:var(--orange);font-family:'JetBrains Mono',monospace;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.5px;}
    td{padding:8px 12px;border-bottom:1px solid var(--border);color:var(--gray-hi);vertical-align:top;}
    tr:hover td{background:var(--bg-hover);}
    ul,ol{padding-left:20px;margin-bottom:14px;}
    li{font-size:0.9rem;color:var(--gray-hi);line-height:1.75;margin-bottom:4px;}
    .tip{background:var(--orange-lo);border:1px solid rgba(255,107,0,0.2);border-radius:8px;padding:14px 16px;margin:16px 0;font-size:0.85rem;color:var(--gray-hi);line-height:1.6;}
    .tip strong{color:var(--orange);}
    .warn{background:rgba(255,82,82,0.06);border:1px solid rgba(255,82,82,0.2);border-radius:8px;padding:14px 16px;margin:16px 0;font-size:0.85rem;color:var(--gray-hi);line-height:1.6;}
    .warn strong{color:#ff5252;}

    /* Nav bottom */
    .page-nav{display:flex;justify-content:space-between;padding:32px 0 48px;border-top:1px solid var(--border);margin-top:48px;}
    .page-nav-btn{background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;padding:12px 20px;cursor:pointer;font-family:'Syne',sans-serif;font-size:0.82rem;font-weight:700;color:var(--gray-hi);transition:all 0.2s;display:flex;flex-direction:column;gap:3px;max-width:200px;}
    .page-nav-btn:hover{border-color:var(--orange);color:var(--text);}
    .page-nav-btn .pnb-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--gray);font-family:'JetBrains Mono',monospace;}
    .page-nav-btn .pnb-title{color:var(--orange);font-size:0.88rem;}
    .page-nav-btn.right{text-align:right;align-items:flex-end;}
    .page-nav-spacer{flex:1;}

    /* Search results */
    .search-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:none;backdrop-filter:blur(4px);}
    .search-overlay.open{display:flex;align-items:flex-start;justify-content:center;padding-top:80px;}
    .search-box{background:var(--bg-card);border:1px solid var(--border-hi);border-radius:16px;width:100%;max-width:580px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
    .search-box input{width:100%;background:none;border:none;border-bottom:1px solid var(--border);padding:18px 20px;color:var(--text);font-family:'Syne',sans-serif;font-size:1rem;outline:none;}
    .search-results{max-height:400px;overflow-y:auto;}
    .sr-item{padding:12px 20px;cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.1s;}
    .sr-item:hover{background:var(--bg-hover);}
    .sr-item .sri-path{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--orange);margin-bottom:3px;}
    .sr-item .sri-title{font-size:0.88rem;font-weight:700;margin-bottom:2px;}
    .sr-item .sri-preview{font-size:0.78rem;color:var(--gray-hi);}
    .sr-empty{padding:24px 20px;text-align:center;color:var(--gray);font-size:0.88rem;}

    @media(max-width:768px){
      .sidebar{display:none;}
      .content{padding:24px 20px;}
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="topbar-logo" href="/">&#9889; Proton#</a>
  <span class="topbar-sep">/</span>
  <span class="topbar-breadcrumb" id="breadcrumb">
    <span class="bc-section">Docs</span>
  </span>
  <div class="topbar-right">
    <div class="topbar-search">
      <span class="si">&#128269;</span>
      <input type="text" placeholder="Search docs... (Ctrl+K)" id="search-trigger" onclick="openSearch()" readonly/>
    </div>
    <span class="version-badge">v0.1.1</span>
    <a class="topbar-link" href="https://protonsharp.com">&#8592; protonsharp.com</a>
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-scroll" id="sidebar-nav"></div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main-scroll">
    <div class="content" id="content-area"></div>
  </div>

</div>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="search-overlay" onclick="closeSearch(event)">
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Search documentation..." oninput="doSearch(this.value)" autofocus/>
    <div class="search-results" id="search-results"></div>
  </div>
</div>

<script>
// ============================================================
// DOCS STRUCTURE
// Each section has: id, icon, title, intro, subsections[]
// Each subsection has: id, title, desc, content (HTML)
// URL: /section-id/subsection-id/
// ============================================================
var DOCS = [

  {
    id: "getting-started",
    icon: "🚀",
    title: "Getting Started",
    intro: "Everything you need to know to write your first Proton# script. Start here if you're new to the language.",
    subs: [
      {
        id: "overview",
        title: "What is Proton#?",
        desc: "Introduction to the language and platform",
        content: `
          <div class="dp-tag">Getting Started</div>
          <h1>What is Proton#?</h1>
          <p class="dp-intro">Proton# is the official scripting language of the Proton# platform. It combines the simplicity of Python, the game-focused design of Lua, and the structure of C# into one language built entirely for game development.</p>
          <h2>Why Proton#?</h2>
          <p>Most game scripting languages make you choose between simplicity and power. Proton# gives you both. It is strict enough to teach good habits and powerful enough to build real multiplayer games.</p>
          <table><tr><th>Feature</th><th>Proton#</th></tr>
          <tr><td>File extension</td><td><code>.pros</code></td></tr>
          <tr><td>Paradigm</td><td>Imperative, object-oriented</td></tr>
          <tr><td>Runs on</td><td>Proton# Studio, Lightweight Editor</td></tr>
          <tr><td>Multiplayer</td><td>Built-in via <code>server.pros</code></td></tr>
          <tr><td>Datastores</td><td>Built-in persistent storage</td></tr></table>
          <h2>Backend Routing</h2>
          <p>Proton# automatically routes code to the right backend depending on what you're doing. You don't need to think about this most of the time.</p>
          <table><tr><th>Task</th><th>Backend</th></tr>
          <tr><td>Game logic, datastores</td><td>Lua</td></tr>
          <tr><td>Interpreter, math, AI</td><td>Python</td></tr>
          <tr><td>GUI, Studio elements</td><td>C#</td></tr>
          <tr><td>Animations, canvas</td><td>JavaScript</td></tr></table>
          <div class="tip"><strong>Tip:</strong> You can manually hint a backend using <code>@lua</code>, <code>@python</code>, <code>@csharp</code>, or <code>@js</code> at the top of a block.</div>
        `
      },
      {
        id: "file-format",
        title: "File Format",
        desc: "The .pros file extension and structure",
        content: `
          <div class="dp-tag">Getting Started</div>
          <h1>File Format</h1>
          <p class="dp-intro">All Proton# scripts use the <code>.pros</code> file extension. Every game, module, and server script you write is a <code>.pros</code> file.</p>
          <h2>File Types</h2>
          <table><tr><th>File</th><th>Purpose</th></tr>
          <tr><td><code>main.pros</code></td><td>Main game script — runs on client</td></tr>
          <tr><td><code>server.pros</code></td><td>Multiplayer server script</td></tr>
          <tr><td><code>*.pros</code></td><td>Any module or helper script</td></tr></table>
          <h2>File Header</h2>
          <p>Every <code>.pros</code> file should start with a block comment header identifying the file:</p>
          <pre><code>--[[
  main.pros
  My Game — Main Script
  Author: YourName
]]

-- your code starts here
var:local score = 0;</code></pre>
          <div class="tip"><strong>Convention:</strong> The header block comment is not required but is strongly recommended. It helps you and collaborators understand each file at a glance.</div>
        `
      },
      {
        id: "syntax",
        title: "Syntax Rules",
        desc: "Core syntax every .pros file follows",
        content: `
          <div class="dp-tag">Getting Started</div>
          <h1>Syntax Rules</h1>
          <p class="dp-intro">Proton# has a small, strict set of syntax rules. Learn these first — they apply to every line of code you write.</p>
          <h2>Semicolons</h2>
          <p>Every statement ends with a semicolon <code>;</code>. No exceptions.</p>
          <pre><code>var:local x = 10;
print(x);
x = x + 1;</code></pre>
          <h2>Blocks use do / end</h2>
          <p>Code blocks are opened with <code>do</code> and closed with <code>end</code>. This applies to functions, if statements, loops, and everything else.</p>
          <pre><code>if x > 5 do
    print("big");
end;

func greet(name) do
    print("Hello " .. name);
end;</code></pre>
          <h2>String Concatenation</h2>
          <p>Use <code>..</code> to join strings together, like Lua.</p>
          <pre><code>var:local msg = "Hello " .. "World";
print("Score: " .. score);</code></pre>
          <h2>Comments</h2>
          <pre><code>-- This is a line comment

--[[
  This is a
  block comment
]]</code></pre>
          <div class="warn"><strong>Note:</strong> Proton# is case-sensitive. <code>myVar</code> and <code>myvar</code> are different variables.</div>
        `
      }
    ]
  },

  {
    id: "language",
    icon: "📦",
    title: "Language",
    intro: "The core Proton# language — types, variables, operators, control flow, functions, and classes.",
    subs: [
      {
        id: "types",
        title: "Types",
        desc: "Data types available in Proton#",
        content: `
          <div class="dp-tag">Language</div>
          <h1>Types</h1>
          <p class="dp-intro">Proton# is dynamically typed — you don't declare types, but every value has one. Understanding types helps you write correct code.</p>
          <h2>Primitive Types</h2>
          <table><tr><th>Type</th><th>Example</th><th>Notes</th></tr>
          <tr><td><code>int</code></td><td><code>42</code></td><td>Whole numbers</td></tr>
          <tr><td><code>float</code></td><td><code>3.14</code></td><td>Decimal numbers</td></tr>
          <tr><td><code>string</code></td><td><code>"hello"</code></td><td>Text in quotes</td></tr>
          <tr><td><code>bool</code></td><td><code>true</code> / <code>false</code></td><td>Boolean</td></tr>
          <tr><td><code>null</code></td><td><code>null</code></td><td>No value</td></tr></table>
          <h2>Collection Types</h2>
          <table><tr><th>Type</th><th>Example</th><th>Notes</th></tr>
          <tr><td><code>array</code></td><td><code>[1, 2, 3]</code></td><td>Ordered list</td></tr>
          <tr><td><code>table</code></td><td><code>{ x: 1, y: 2 }</code></td><td>Key-value pairs</td></tr></table>
          <h2>Type Conversion</h2>
          <pre><code>var:local n = toint("42");      -- string to int
var:local s = tostring(100);    -- int to string
var:local f = tofloat("3.14"); -- string to float
var:local b = tobool(1);        -- 1 to true</code></pre>
          <h2>Checking Types</h2>
          <pre><code>print(typeof(42));        -- "int"
print(typeof("hello"));  -- "string"
print(typeof(true));      -- "bool"
print(typeof(null));      -- "null"</code></pre>
        `
      },
      {
        id: "variables",
        title: "Variables",
        desc: "Declaring and using variables",
        content: `
          <div class="dp-tag">Language</div>
          <h1>Variables</h1>
          <p class="dp-intro">Proton# has three kinds of variable declarations depending on where the variable lives and whether it can change.</p>
          <h2>Local Variable</h2>
          <p>Lives inside the current block or function. Most common kind.</p>
          <pre><code>var:local score = 0;
var:local name = "Player";
var:local alive = true;</code></pre>
          <h2>Local Constant</h2>
          <p>Like a local variable but cannot be reassigned after declaration.</p>
          <pre><code>const:local MAX_HEALTH = 100;
const:local GRAVITY = 9.8;
const:local GAME_NAME = "Dungeon Escape";</code></pre>
          <h2>Module Variable (Global)</h2>
          <p>Lives on the module — accessible from anywhere in the script including other functions and the server.</p>
          <pre><code>module.players = [];
module.gameRunning = false;
module.score = 0;</code></pre>
          <div class="tip"><strong>Rule of thumb:</strong> Use <code>var:local</code> by default. Only use <code>module.</code> when the value needs to be shared across functions or accessed by the server.</div>
          <h2>Assignment</h2>
          <pre><code>var:local x = 10;
x = 20;          -- reassign
x = x + 5;      -- increment

-- shorthand not supported yet
-- x += 5;  ← not valid in Proton#</code></pre>
          <h2>Multiple Assignment</h2>
          <pre><code>var:local a = 1;
var:local b = 2;
var:local temp = a;
a = b;
b = temp;</code></pre>
        `
      },
      {
        id: "operators",
        title: "Operators",
        desc: "Arithmetic, comparison, and logical operators",
        content: `
          <div class="dp-tag">Language</div>
          <h1>Operators</h1>
          <p class="dp-intro">Proton# supports standard arithmetic, comparison, and logical operators. String concatenation uses <code>..</code> like Lua.</p>
          <h2>Arithmetic</h2>
          <table><tr><th>Operator</th><th>Name</th><th>Example</th></tr>
          <tr><td><code>+</code></td><td>Add</td><td><code>5 + 3</code> → <code>8</code></td></tr>
          <tr><td><code>-</code></td><td>Subtract</td><td><code>5 - 3</code> → <code>2</code></td></tr>
          <tr><td><code>*</code></td><td>Multiply</td><td><code>5 * 3</code> → <code>15</code></td></tr>
          <tr><td><code>/</code></td><td>Divide</td><td><code>10 / 2</code> → <code>5</code></td></tr>
          <tr><td><code>%</code></td><td>Modulo</td><td><code>10 % 3</code> → <code>1</code></td></tr>
          <tr><td><code>**</code></td><td>Power</td><td><code>2 ** 8</code> → <code>256</code></td></tr></table>
          <h2>Comparison</h2>
          <table><tr><th>Operator</th><th>Meaning</th></tr>
          <tr><td><code>==</code></td><td>Equal</td></tr>
          <tr><td><code>!=</code></td><td>Not equal</td></tr>
          <tr><td><code>&gt;</code></td><td>Greater than</td></tr>
          <tr><td><code>&lt;</code></td><td>Less than</td></tr>
          <tr><td><code>&gt;=</code></td><td>Greater or equal</td></tr>

  server.pros
  Proton# Multiplayer Server
]]

import std.network;

-- Config
const:local PORT       = 7777;
const:local MAX_PLAYERS = 10;

-- State
module.players     = [];
module.gameRunning = false;

-- Player connects
network.onConnect(func(player) do
    print("[SERVER] " .. player.name .. " connected (" .. player.ip .. ")");
    module.players.push(player);

    -- Tell everyone else
    network.broadcastExcept(player, "PlayerJoined", {
        id:   player.id,
        name: player.name
    });

    -- Welcome the new player
    network.send(player, "Welcome", {
        yourId:  player.id,
        players: module.players
    });

network.onDisconnect(func(player) do
    var:local idx = module.players.indexOf(player);
    module.players.remove(idx);
    network.broadcast("PlayerLeft", {
        id:   player.id,
        name: player.name
    });

// ============================================================
// ROUTER — handles URL paths like /variables/types/
// ============================================================
var currentSection = null;
var currentSub = null;

function parsePath() {
  var path = window.location.pathname.replace(/^\//, '').replace(/\/$/, '');
  var parts = path.split('/').filter(Boolean);
  // parts[0] = section, parts[1] = subsection
  return { section: parts[0] || null, sub: parts[1] || null };
}

function navigate(sectionId, subId, push) {
  if (push === undefined) push = true;
  var path = '/';
  if (sectionId) path += sectionId + '/';
  if (subId) path += subId + '/';
  if (push) history.pushState({ section: sectionId, sub: subId }, '', path);
  render(sectionId, subId);
}

window.addEventListener('popstate', function(e) {
  var p = parsePath();
  render(p.section, p.sub);
});

// ============================================================
// RENDER
// ============================================================
function render(sectionId, subId) {
  currentSection = sectionId;
  currentSub = subId;
  renderSidebar();
  renderContent(sectionId, subId);
  updateBreadcrumb(sectionId, subId);
  document.getElementById('main-scroll').scrollTop = 0;
}

function findSection(id) {
  return DOCS.find(function(s){ return s.id === id; });
}

function findSub(section, subId) {
  if (!section) return null;
  return section.subs.find(function(s){ return s.id === subId; });
}

function renderSidebar() {
  var html = '';
  html += '<div class="sb-label">Documentation</div>';
  DOCS.forEach(function(section) {
    var isOpen = currentSection === section.id;
    html += '<div class="sb-group">';
    html += '<button class="sb-group-btn ' + (isOpen ? 'active open' : '') + '" onclick="navigate(\'' + section.id + '\', null)">';
    html += '<span class="g-icon">' + section.icon + '</span>';
    html += section.title;
    html += '<span class="g-count">' + section.subs.length + '</span>';
    html += '<span class="g-arrow">&#9654;</span>';
    html += '</button>';
    html += '<div class="sb-subs ' + (isOpen ? 'open' : '') + '">';
    section.subs.forEach(function(sub) {
      var isActive = currentSection === section.id && currentSub === sub.id;
      html += '<button class="sb-sub-btn ' + (isActive ? 'active' : '') + '" onclick="navigate(\'' + section.id + '\', \'' + sub.id + '\')">';
      html += sub.title;
      html += '</button>';
    });
    html += '</div></div>';
  });
  document.getElementById('sidebar-nav').innerHTML = html;
}

function renderContent(sectionId, subId) {
  var area = document.getElementById('content-area');

  // Home page
  if (!sectionId) {
    area.innerHTML = renderHome();
    return;
  }

  var section = findSection(sectionId);
  if (!section) { area.innerHTML = '<h1>Not found</h1>'; return; }

  // Section landing page
  if (!subId) {
    area.innerHTML = renderSectionLanding(section);
    return;
  }

  // Sub page
  var sub = findSub(section, subId);
  if (!sub) { area.innerHTML = '<h1>Not found</h1>'; return; }
  area.innerHTML = renderSubPage(section, sub);
}

function renderHome() {
  var html = '<div class="section-landing">';
  html += '<div class="sl-tag">Documentation</div>';
  html += '<h1>Proton# Docs</h1>';
  html += '<p class="sl-intro">The official reference for the Proton# language and platform. Pick a section below to get started.</p>';
  html += '<div class="sub-cards">';
  DOCS.forEach(function(s) {
    html += '<div class="sub-card" onclick="navigate(\'' + s.id + '\', null)">';
    html += '<div class="sc-icon">' + s.icon + '</div>';
    html += '<div class="sc-name">' + s.title + '</div>';
    html += '<div class="sc-desc">' + s.intro.substring(0, 80) + '...</div>';
    html += '<div class="sc-arrow">' + s.subs.length + ' pages &#8594;</div>';
    html += '</div>';
  });
  html += '</div></div>';
  return html;
}

function renderSectionLanding(section) {
  var html = '<div class="section-landing">';
  html += '<div class="sl-tag">' + section.title + '</div>';
  html += '<h1>' + section.icon + ' ' + section.title + '</h1>';
  html += '<p class="sl-intro">' + section.intro + '</p>';
  html += '<div class="sub-cards">';
  section.subs.forEach(function(sub) {
    html += '<div class="sub-card" onclick="navigate(\'' + section.id + '\', \'' + sub.id + '\')">';
    html += '<div class="sc-name">' + sub.title + '</div>';
    html += '<div class="sc-desc">' + sub.desc + '</div>';
    html += '<div class="sc-arrow">Read &#8594;</div>';
    html += '</div>';
  });
  html += '</div></div>';

  // Page nav
  html += '<div class="page-nav">';
  var prevSection = getPrevSection(section.id);
  var nextSection = getNextSection(section.id);
  if (prevSection) {
    html += '<button class="page-nav-btn" onclick="navigate(\'' + prevSection.id + '\', null)">';
    html += '<span class="pnb-label">&#8592; Previous</span>';
    html += '<span class="pnb-title">' + prevSection.title + '</span>';
    html += '</button>';
  } else html += '<div></div>';
  if (nextSection) {
    html += '<button class="page-nav-btn right" onclick="navigate(\'' + nextSection.id + '\', null)">';
    html += '<span class="pnb-label">Next &#8594;</span>';
    html += '<span class="pnb-title">' + nextSection.title + '</span>';
    html += '</button>';
  }
  html += '</div>';
  return html;
}

function renderSubPage(section, sub) {
  var html = '<div class="doc-page">' + sub.content + '</div>';

  // Prev/next nav
  var allPages = [];
  DOCS.forEach(function(s) {
    allPages.push({ type: 'section', section: s, sub: null });
    s.subs.forEach(function(sb) { allPages.push({ type: 'sub', section: s, sub: sb }); });
  });
  var idx = allPages.findIndex(function(p){ return p.type === 'sub' && p.section.id === section.id && p.sub.id === sub.id; });

  html += '<div class="page-nav">';
  if (idx > 0) {
    var prev = allPages[idx-1];
    html += '<button class="page-nav-btn" onclick="navigate(\'' + prev.section.id + '\', ' + (prev.sub ? '\'' + prev.sub.id + '\'' : 'null') + ')">';
    html += '<span class="pnb-label">&#8592; Previous</span>';
    html += '<span class="pnb-title">' + (prev.sub ? prev.sub.title : prev.section.title) + '</span>';
    html += '</button>';
  } else html += '<div></div>';
  if (idx < allPages.length - 1) {
    var next = allPages[idx+1];
    html += '<button class="page-nav-btn right" onclick="navigate(\'' + next.section.id + '\', ' + (next.sub ? '\'' + next.sub.id + '\'' : 'null') + ')">';
    html += '<span class="pnb-label">Next &#8594;</span>';
    html += '<span class="pnb-title">' + (next.sub ? next.sub.title : next.section.title) + '</span>';
    html += '</button>';
  }
  html += '</div>';
  return html;
}

function getPrevSection(id) {
  var idx = DOCS.findIndex(function(s){ return s.id === id; });
  return idx > 0 ? DOCS[idx-1] : null;
}

function getNextSection(id) {
  var idx = DOCS.findIndex(function(s){ return s.id === id; });
  return idx < DOCS.length - 1 ? DOCS[idx+1] : null;
}

function updateBreadcrumb(sectionId, subId) {
  var bc = document.getElementById('breadcrumb');
  var section = sectionId ? findSection(sectionId) : null;
  var sub = section && subId ? findSub(section, subId) : null;
  if (!section) {
    bc.innerHTML = '<span class="bc-section">Docs</span>';
  } else if (!sub) {
    bc.innerHTML = '<span class="bc-section">' + section.title + '</span>';
  } else {
    bc.innerHTML = '<span class="bc-section" style="cursor:pointer" onclick="navigate(\'' + section.id + '\', null)">' + section.title + '</span>'
      + ' <span style="color:var(--gray)">/</span> '
      + '<span class="bc-sub">' + sub.title + '</span>';
  }
}

// ============================================================
// SEARCH
// ============================================================
function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(function(){ document.getElementById('search-input').focus(); }, 50);
}

function closeSearch(e) {
  if (!e || e.target === document.getElementById('search-overlay')) {
    document.getElementById('search-overlay').classList.remove('open');
    document.getElementById('search-input').value = '';
    document.getElementById('search-results').innerHTML = '';
  }
}

function doSearch(query) {
  var results = document.getElementById('search-results');
  if (!query.trim()) { results.innerHTML = ''; return; }
  query = query.toLowerCase();
  var matches = [];
  DOCS.forEach(function(section) {
    section.subs.forEach(function(sub) {
      var haystack = (sub.title + ' ' + sub.desc + ' ' + sub.content).toLowerCase();
      if (haystack.indexOf(query) >= 0) {
        var preview = sub.desc;
        matches.push({ section: section, sub: sub, preview: preview });
      }
    });
  });
  if (!matches.length) {
    results.innerHTML = '<div class="sr-empty">No results for "' + query + '"</div>';
    return;
  }
  results.innerHTML = matches.slice(0, 10).map(function(m) {
    return '<div class="sr-item" onclick="navigate(\'' + m.section.id + '\', \'' + m.sub.id + '\');closeSearch()">'
      + '<div class="sri-path">' + m.section.title + ' / ' + m.sub.title + '</div>'
      + '<div class="sri-title">' + m.sub.title + '</div>'
      + '<div class="sri-preview">' + m.preview + '</div>'
      + '</div>';
  }).join('');
}

// keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); openSearch(); }
  if (e.key === 'Escape') closeSearch();
});

// ============================================================
// INIT — read URL on load
// ============================================================
// ── GitHub Pages 404 redirect handler ──
// If redirected from 404.html via ?p=, restore the real path
(function() {
  var params = new URLSearchParams(window.location.search);
  var redirectPath = params.get('p');
  if (redirectPath) {
    history.replaceState(null, null, redirectPath);
  }
})();

window.addEventListener('DOMContentLoaded', function() {
  var p = parsePath();
  render(p.section, p.sub);
});

// expose for onclick handlers
window.navigate = navigate;
window.openSearch = openSearch;
window.closeSearch = closeSearch;
window.doSearch = doSearch;
</script>
